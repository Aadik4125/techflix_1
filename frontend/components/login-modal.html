<!-- LOGIN MODAL -->
<div id="login-modal" class="modal hidden">
    <div class="modal-content auth-modal">
        <div class="modal-header auth-modal-header">
            <div class="auth-icon-wrap">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M4 21v-2a4 4 0 0 1 3-3.87" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
            <div class="auth-text-wrap">
                <h2>Sign In Or Create Account</h2>
                <p>Your account is linked to backend storage for sessions, audio, and scores.</p>
            </div>
        </div>
        <form id="login-form" class="auth-form" onsubmit="submitSignup(event)">
            <label>Full Name<input type="text" id="input-name" required placeholder="Your full name"></label>
            <label>Email Address<input type="email" id="input-email" required placeholder="you@example.com"></label>
            <label>Age<input type="number" id="input-age" min="0" required placeholder="e.g. 34"></label>
            <div class="modal-actions">
                <button type="submit" class="btn-primary auth-submit">Save And Continue</button>
                <button type="button" class="btn-secondary auth-cancel" onclick="hideLogin()">Cancel</button>
            </div>
        </form>
    </div>
</div>
