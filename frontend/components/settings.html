<!-- ══════════ SETTINGS PAGE ══════════ -->
<section id="settings-page" style="display:none; padding-top:96px;">
    <div class="settings-card">
        <h2 style="font-family:'Cormorant Garamond',serif; margin-bottom:24px;">Account Settings</h2>
        <div class="settings-section">
            <label>Name<input type="text" id="settings-name"></label>
            <label>Email<input type="email" id="settings-email"></label>
            <label>Age<input type="number" id="settings-age"></label>
            <div style="display:flex; gap:10px; margin-top:16px;">
                <button class="btn-primary" onclick="saveSettings()">Save Changes</button>
                <button class="btn-secondary" onclick="goBack()">Cancel</button>
            </div>
        </div>
    </div>
</section>
