<!-- ══════════ PROFILE PAGE ══════════ -->
<section id="profile-page" style="display:none; padding-top:96px; text-align:center;">
    <div class="profile-page-card">
        <div class="profile-avatar-large" id="profile-avatar-large"></div>
        <h2 id="profile-name-large" style="font-family:'Cormorant Garamond',serif; font-size:24px; margin-bottom:4px;">
        </h2>
        <p id="profile-email-large" style="color:var(--text-secondary); margin-bottom:20px;"></p>
        <div style="background:var(--bg); border-radius:10px; padding:16px; text-align:left; margin-bottom:20px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><strong>Age</strong><span
                    id="profile-age-large"></span></div>
            <div style="display:flex; justify-content:space-between;"><strong>Risk Level</strong><span
                    id="profile-risk-large" style="font-weight:700;"></span></div>
        </div>
        <button class="btn-primary" onclick="goBack()">Back to Dashboard</button>
    </div>
</section>
